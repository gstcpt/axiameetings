services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # production build — much less memory
    container_name: axia_app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:admin@host.docker.internal:5432/axiameetingforall?schema=public
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
