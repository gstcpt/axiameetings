name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: axiameetingforall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Translation Check
        run: python src/messages/check_i18n.py

      - name: Run Linting
        run: npm run lint

      - name: Run Type Checking
        run: npx tsc --noEmit

      - name: Build Project
        env:
          DATABASE_URL: "postgresql://postgres:admin@localhost:5432/axiameetingforall?schema=public"
          DIRECT_URL: "postgresql://postgres:admin@localhost:5432/axiameetingforall?schema=public"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-jwt-secret-key-for-ci"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          NEXT_PUBLIC_LIVEKIT_URL: "wss://test.livekit.cloud"
          LIVEKIT_API_KEY: "test-key"
          LIVEKIT_API_SECRET: "test-secret"
        run: npm run build
